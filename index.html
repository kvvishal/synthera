<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florya Clone</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="container">
            <h1>Clinical Clarity for Your Symptoms</h1>
            <p>Free screening for PCOS, hormonal issues & more</p>
            <button id="startBtn">Check Your Risk</button>
        </div>
    </section>

    <!-- PROBLEM SECTION -->
    <section class="problem">
        <div class="container">
            <h2>Why Diagnosis Takes Years</h2>
            <div class="stats">
                <div class="box">7–10 Years Delay</div>
                <div class="box">46% Misdiagnosis</div>
            </div>
        </div>
    </section>

    <!-- FEATURES -->
    <section class="features">
        <div class="container">
            <h2>Conditions We Cover</h2>
            <div class="cards">
                <div class="card">PCOS</div>
                <div class="card">Endometriosis</div>
                <div class="card">Hormonal Imbalance</div>
                <div class="card">Thyroid</div>
            </div>
        </div>
    </section>

    <!-- STEPS -->
    <section class="steps">
        <div class="container">
            <h2>How It Works</h2>
            <div class="step-box">
                <div class="step">1. Answer Questions</div>
                <div class="step">2. Get Analysis</div>
                <div class="step">3. Upload Reports</div>
                <div class="step">4. Get Insights</div>
            </div>
        </div>
    </section>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
