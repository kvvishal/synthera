<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Synthera - Personal Info</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">Synthera</h2>
  <button class="logout">Logout</button>
</div>

<!-- MAIN CARD -->
<div class="main-card">

  <h2>👤 Personal Information</h2>
  <p class="subtitle">Enter your basic details to begin assessment</p>

  <!-- AGE -->
  <label>Age</label>
  <input type="number" placeholder="Enter your age" id="age">

  <!-- HEIGHT + WEIGHT -->
  <div class="main-card">

  <h2>👤 Personal Information</h2>
  <p class="subtitle">Enter your basic details to begin assessment</p>

  <label>Age</label>
  <input type="number" id="age" placeholder="Enter your age">

  <div class="row">
    <div class="input-box">
      <label>Height (cm)</label>
      <input type="number" id="height" placeholder="e.g. 165">
    </div>

    <div class="input-box">
      <label>Weight (kg)</label>
      <input type="number" id="weight" placeholder="e.g. 60">
    </div>
  </div>

  <div class="info-box">
    These values help us estimate BMI and improve screening accuracy.
  </div>

  <!-- ✅ BUTTON NOW INSIDE CARD -->
  <button class="next-btn" id="nextBtn">Continue →</button>

</div>

<!-- BUTTON -->
<div class="bottom-bar">
  <button class="next-btn" id="nextBtn">Continue →</button>
</div>

<script src="script.js"></script>

</body>
</html>
