<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthera - Personal Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #fafafa;">

    <div class="navbar" style="background: white; border-bottom: 1px solid #eaeaea;">
        <h2 class="logo" style="color: #333;">Synthera</h2>
        <button class="logout" style="color: #666; border: 1px solid #ccc; background: white;">Logout</button>
    </div>

    <div class="dashboard-container" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 40px; min-height: 100vh;">
        
        <div class="personal-info-card">
            
            <h2 style="margin-top: 0; color: #1e293b; display: flex; align-items: center; gap: 10px;">
                👤 Personal Information
            </h2>
            <p class="subtitle" style="color: #64748b; font-size: 14px; margin-bottom: 25px;">
                Enter your basic details to begin assessment
            </p>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="Enter your age">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" placeholder="e.g. 165">
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="e.g. 60">
                </div>
            </div>

           <div class="info-box" style="background: #F8F7FF; border-left: 4px solid #B56576; padding: 15px; border-radius: 8px; font-size: 13px; color: #555; margin: 25px 0;">
                These values help us estimate BMI and improve screening accuracy.
            </div>

            <div style="display: flex; justify-content: center;">
                <button class="syn-nav-btn" id="nextBtn" style="width: 100%;">
                    Continue →
                </button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
