<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F8F7FF" stroke="#6D597A" stroke-width="2"/>
  
  <!-- Logo symbol - stylized health icon -->
  <g transform="translate(100, 100)">
    <!-- Heart shape -->
    <path d="M 0,-15 C -12,-28 -35,-28 -35,-8 C -35,15 0,45 0,45 C 0,45 35,15 35,-8 C 35,-28 12,-28 0,-15 Z" fill="#B56576"/>
    
    <!-- Plus sign overlay -->
    <rect x="-4" y="-20" width="8" height="40" fill="#F8F7FF"/>
    <rect x="-20" y="-4" width="40" height="8" fill="#F8F7FF"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#6D597A">Synthera</text>
</svg>
