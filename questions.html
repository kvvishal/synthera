<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assessment Step 1</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">Florya</h2>
  <button class="logout">Log out</button>
</div>

<!-- PROGRESS -->
<div class="progress-container">
  <p id="stepText">STEP 1</p>
  <p id="percentText">0% Complete</p>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- QUESTION CARD -->
<div id="symptomStep">
  <h2>Previous Diagnoses</h2>

  <div class="options">
    <div class="option">PCOS</div>
    <div class="option">Endometriosis</div>
    <div class="option">Thyroid disorder</div>
    <div class="option">None</div>
  </div>

  <button id="nextQ">Next</button>
</div>


<!-- STEP 2: QUESTIONS -->
<div id="questionStep" style="display:none;">
  <div id="dynamicQuestions"></div>

  <div class="bottom-bar">
    <button id="backBtn">← Back</button>
    <button id="nextBtnQ">Next →</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
