<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assessment Step 1</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2 class="logo">Florya</h2>
  <button class="logout">Log out</button>
</div>

<!-- PROGRESS -->
<div class="progress-container">
  <p>STEP 1 OF 7</p>
  <p>0% Complete</p>
  <div class="progress-bar">
    <div class="progress-fill" style="width: 10%"></div>
  </div>
</div>

<!-- QUESTION CARD -->
<div class="main-card">

  <h2>Previous Diagnoses</h2>
  <p>Have you ever been diagnosed with any of the following conditions?</p>

  <div class="options">
    <div class="option">PCOS</div>
    <div class="option">Endometriosis</div>
    <div class="option">Uterine Fibroids</div>
    <div class="option">Thyroid disorder</div>
    <div class="option">Primary Ovarian Insufficiency</div>
  </div>

</div>

<!-- BUTTONS -->
<div class="bottom-bar">
  <button class="back-btn">← Back</button>
  <button class="next-btn" id="nextQ">Next Step →</button>
</div>

<script src="script.js"></script>

</body>
</html>
